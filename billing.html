<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Billing & Invoicing</title>
  <link rel="stylesheet" href="billing.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="page">

  <!-- BREADCRUMB -->
  <div class="breadcrumb">
    <span class="bc-link">Finance</span>
    <span class="bc-sep">›</span>
    <span class="bc-active">Invoice</span>
  </div>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <h1 class="page-title">Billing &amp; Invoicing</h1>
    <div class="header-actions">
      <button class="btn-outline">
        <span class="btn-plus">+</span> Create Invoice
      </button>
      <button class="btn-primary" onclick="window.location.href='quotation.html'">
        <span class="btn-plus">+</span> Create Quotation
      </button>
    </div>
  </div>

  <!-- STAT CARDS -->
  <div class="stat-cards">
    <div class="stat-card">
      <div class="stat-icon icon-blue">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="11" width="4" height="8" rx="1" fill="#3b82f6"/>
          <rect x="8" y="6" width="4" height="13" rx="1" fill="#3b82f6"/>
          <rect x="15" y="2" width="4" height="17" rx="1" fill="#3b82f6"/>
        </svg>
      </div>
      <div class="stat-label">Total Value</div>
      <div class="stat-value">₹2,50,000</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon icon-green">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M17 10C17 13.866 13.866 17 10 17C6.13401 17 3 13.866 3 10C3 6.13401 6.13401 3 10 3C11.7492 3 13.3512 3.63187 14.5933 4.67363" stroke="#22c55e" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M7 10L9.5 12.5L15 7" stroke="#22c55e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="stat-label">Total Paid(yearly)</div>
      <div class="stat-value">₹2,05,500</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon icon-orange">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="10" cy="10" r="7.5" stroke="#f59e0b" stroke-width="1.8"/>
          <path d="M10 6.5V10.5L12.5 12" stroke="#f59e0b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="stat-label">Pending Amount</div>
      <div class="stat-value">₹44,500 <span class="stat-note">(12 invoices Pending)</span></div>
    </div>
  </div>

  <!-- TABS + SEARCH + FILTER ROW -->
  <div class="toolbar">
    <div class="tabs">
      <button class="tab active" data-tab="quotations">Quotations</button>
      <button class="tab" data-tab="invoices">Invoices</button>
    </div>
    <div class="toolbar-right">
      <div class="search-box">
        <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" class="search-input" placeholder="Search client..."/>
      </div>
      <div class="filter-select-wrap">
        <select class="filter-select">
          <option>All</option>
          <option>Sent</option>
          <option>Convert</option>
        </select>
        <span class="filter-arrow">∨</span>
      </div>
    </div>
  </div>

  <!-- QUOTATIONS TABLE -->
  <div class="tab-panel" id="panel-quotations">
    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>Client(Company Billing)</th>
            <th>Project</th>
            <th>Quote Number</th>
            <th>Amount</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="quotations-body"></tbody>
      </table>
    </div>
    <div class="pagination" id="quotations-pagination"></div>
  </div>

  <!-- INVOICES TABLE -->
  <div class="tab-panel hidden" id="panel-invoices">
    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>Invoice Number</th>
            <th>Client(Company Billing)</th>
            <th>Project</th>
            <th>Amount</th>
            <th>Paid</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="invoices-body"></tbody>
      </table>
    </div>
    <div class="pagination" id="invoices-pagination"></div>
  </div>

</div>

<!-- Dropdown menu -->
<div class="dropdown-menu hidden" id="dropdownMenu">
  <button class="dropdown-item">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    Edit
  </button>
  <button class="dropdown-item danger">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
    Move to Trash
  </button>
</div>

<script src="billing.js"></script>
</body>
</html>
